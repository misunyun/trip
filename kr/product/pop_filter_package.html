<!DOCTYPE html>
<html lang="ko">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta http-equiv="Content-Style-Type" content="text/css">
	<meta http-equiv="Content-Script-Type" content="text/javascript">
	<meta name="format-detection" content="telephone=no">
	<title>SHILLATRIP</title>
	<link type="text/css" href="../../resource/css/common.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/product.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/desktop.css" rel="stylesheet" />
</head>

<body>
<div class="wrap">

	<!-- 팝업 : S -->
	<div class="popup filter show">
		<!-- Modal content -->
		<div class="head" data-native="status">	<!-- data-native 추가  2019-11-07 -->
			<h1>필터</h1>
			<button type="button" name="button" class="btn_txt type5 reset">초기화</button>
			<button type="button" name="button" class="ico btn_close">팝업닫기</button>
		</div>
		<div class="pop_cont">

			<section class="filter fold_area">
				<h2>카테고리</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list half_type">
						<li><label class="checkbox" for="cate01"><input type="checkbox" id="cate01" name="cate" checked><span></span>패키지</label></li>
						<li><label class="checkbox" for="cate02"><input type="checkbox" id="cate02" name="cate" checked><span></span>에어텔</label></li>
						<li><label class="checkbox" for="cate03"><input type="checkbox" id="cate03" name="cate" checked><span></span>땡처리항공권</label></li>
						<li><label class="checkbox" for="cate04"><input type="checkbox" id="cate04" name="cate" checked><span></span>선박/크루즈</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>여행사
					<label class="checkbox fright" for="agency_all"><input type="checkbox" id="agency_all" name="agency" checked><span></span>전체</label>
				</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list half_type">
						<li><label class="checkbox" for="agency01"><input type="checkbox" id="agency01" name="agency" checked><span></span>모두투어</label></li>
						<li><label class="checkbox" for="agency02"><input type="checkbox" id="agency02" name="agency" checked><span></span>노랑풍선</label></li>
						<li><label class="checkbox" for="agency03"><input type="checkbox" id="agency03" name="agency" checked><span></span>하나투어</label></li>
						<li><label class="checkbox" for="agency04"><input type="checkbox" id="agency04" name="agency" checked><span></span>롯데관광</label></li>
						<li><label class="checkbox" for="agency05"><input type="checkbox" id="agency05" name="agency" checked><span></span>온라인투어</label></li>
						<li><label class="checkbox" for="agency06"><input type="checkbox" id="agency06" name="agency" checked><span></span>인터파크투어</label></li>
						<li><label class="checkbox" for="agency07"><input type="checkbox" id="agency07" name="agency" checked><span></span>한진관광</label></li>
						<li><label class="checkbox" for="agency08"><input type="checkbox" id="agency08" name="agency" checked><span></span>내일투어</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>항공사
					<label class="checkbox fright" for="airline_all"><input type="checkbox" id="airline_all" name="airline" checked><span></span>전체</label>
				</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list half_type">
						<li><label class="checkbox" for="airline01"><input type="checkbox" id="airline01" name="airline" checked><span></span>대한항공</label></li>
						<li><label class="checkbox" for="airline02"><input type="checkbox" id="airline02" name="airline" checked><span></span>아시아나항공</label></li>
						<li><label class="checkbox" for="airline03"><input type="checkbox" id="airline03" name="airline" checked><span></span>진에어</label></li>
						<li><label class="checkbox" for="airline04"><input type="checkbox" id="airline04" name="airline" checked><span></span>제주에어</label></li>
						<li><label class="checkbox" for="airline05"><input type="checkbox" id="airline05" name="airline" checked><span></span>이스타항공</label></li>
						<li><label class="checkbox" for="airline06"><input type="checkbox" id="airline06" name="airline" checked><span></span>에어서울</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter">
				<h2>일정 <span class="stxt">1박2일 ~ 3박4일</span></h2>
				<div class="range_wrap">
					<div class="range_bar"><span class="range_bar_value" style="left:20%; width: 60%"></span></div>
					<span class="range_pointer" style="left:20%"></span>
					<span class="range_pointer" style="left:80%"></span>
				</div>
			</section>

			<!-- 임시로 작성 만약추후발견시 일괄삭제 -->
			<style media="screen">
			</style>
			<!-- //임시로 작성 만약추후발견시 일괄삭제 -->

			<section class="filter box_type1">
				<h2>출발시간 <!-- 2019-11-20 삭제 <span class="stxt">06:00 ~ 12:00</span> --></h2>
				<p>
					<label class="checkbox checked" for="time01"><input type="checkbox" name="time" id="time01"><span></span>새벽<br> 00:00 ~ 06:00</label>
					<label class="checkbox checked" for="time02"><input type="checkbox" name="time" id="time02"><span></span>오전<br> 06:00 ~ 12:00</label>
					<label class="checkbox checked" for="time03"><input type="checkbox" name="time" id="time03"><span></span>오후<br> 12:00 ~ 18:00</label>
					<label class="checkbox checked" for="time04"><input type="checkbox" name="time" id="time04"><span></span>야간<br> 18:00 ~ 00:00</label>
				</p>
			</section>

			<section class="filter">
				<h2>쇼핑횟수 <span class="stxt">1회 ~ 3회</span></h2>
				<div class="range_wrap">
					<div class="range_bar"><span class="range_bar_value" style="left:20%; width: 60%"></span></div>
					<span class="range_pointer" style="left:20%"></span>
					<span class="range_pointer" style="left:80%"></span>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>인솔자</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list half_type">
						<li><label class="checkbox" for="leader01"><input type="checkbox" id="leader01" name="leader" checked><span></span>동행</label></li>
						<li><label class="checkbox" for="leader02"><input type="checkbox" id="leader02" name="leader" checked><span></span>비동행</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>가이드</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list half_type">
						<li><label class="checkbox" for="guide01"><input type="checkbox" id="guide01" name="guide" checked><span></span>포함</label></li>
						<li><label class="checkbox" for="guide02"><input type="checkbox" id="guide02" name="guide" checked><span></span>불포함</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>자유일정</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list half_type">
						<li><label class="checkbox" for="travel01"><input type="checkbox" id="travel01" name="travel" checked><span></span>포함</label></li>
						<li><label class="checkbox" for="travel02"><input type="checkbox" id="travel02" name="travel" checked><span></span>불포함</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter">
				<h2>가격 <span class="stxt">350,000원 ~ 2,000,000원</span></h2>
				<div class="range_wrap">
					<div class="range_bar"><span class="range_bar_value" style="left:20%; width: 60%"></span></div>
					<span class="range_pointer" style="left:20%"></span>
					<span class="range_pointer" style="left:80%"></span>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>출발확정</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list">
						<li><label class="checkbox" for="start"><input type="checkbox" id="start" name="start"><span></span>출발확정 상품만 보기</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>흥정 상품</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list">
						<li><label class="checkbox" for="deal"><input type="checkbox" id="deal" name="deal"><span></span>흥정 가능 상품만 보기</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>

			<section class="filter fold_area">
				<h2>모아랑 상품</h2>
				<div class="fold_target" fold-height="110">
					<ul class="item_list">
						<li><label class="checkbox" for="mprd01"><input type="checkbox" id="mprd01" name="mprd"><span></span>모아랑 상품만 보기</label></li>
					</ul>
				</div>
				<div class="fold_button">
					<button type="button" name="button" class="btn_ico unfold">더보기</button>
					<button type="button" name="button" class="btn_ico fold">접기</button>
				</div>
			</section>
		</div>

		<div class="btn_box">
			<button type="submit" name="button" class="btn primary">확인</button>
		</div>
	</div>
	<!-- 팝업 : E -->
</div>

<script type="text/javascript" src="../../resource/js/jquery-1.11.2.min.js"></script>
<script type="text/javascript" src="../../resource/js/slick.min_v2.js"></script>

<script type="text/javascript" src="../../resource/js/intersection-observer.js"></script><!-- 2019-11-13 intersection-observer.js 추가 -->
<script type="text/javascript" src="../../resource/js/bluebird.min.js"></script>
<script type="text/javascript" src="../../resource/js/lalang.js"></script>

</body>
</html>
