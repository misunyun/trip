<!DOCTYPE html>
<html lang="ko">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta http-equiv="Content-Style-Type" content="text/css">
	<meta http-equiv="Content-Script-Type" content="text/javascript">
	<meta name="format-detection" content="telephone=no">
	<title>SHILLATRIP</title>
	<link type="text/css" href="../../resource/css/common.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/product.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/desktop.css" rel="stylesheet" />
</head>

<body>
<div class="wrap">
	<!-- 팝업 : S -->
	<div class="popup show">
		<!-- Modal content -->
		<div class="head" data-native="status"><!-- data-native 추가  2019-11-07 -->
			<h1>인원선택</h1>
			<button type="button" name="button" class="ico btn_close">팝업닫기</button>
		</div>
		<div class="pop_cont">
			<!-- 2019-12-20 인원선택 부분 수정 -->
			<div class="per_box">
				<ul class="seat_option">
					<li>
						<span class="tit"><b>성인</b> 만 18세 이상</span>
						<span class="ctrl">
							<button type="button" name="button" class="ico btn_minus2" disabled="">삭제</button>
							<input type="text" name="" value="1" class="em">
							<button type="button" name="button" class="ico btn_plus2">추가</button>
						</span>
					</li>
					<li>
						<span class="tit"><b>어린이</b> 만 17세 이하</span>
						<span class="ctrl">
							<button type="button" name="button" class="ico btn_minus2" disabled="">삭제</button>
							<input type="text" name="" value="1" class="em">
							<button type="button" name="button" class="ico btn_plus2">추가</button>
						</span>
					</li>
				</ul>
				<div class="sel_option">
					<ul>
						<li>
							<span class="tit">어린이 1</span>
							<span class="opt"><button type="button" name="button" class="btn_option" option-call="sort_child1">만 2세</button></span>
						</li>
						<li>
							<span class="tit">어린이 2</span>
							<span class="opt"><button type="button" name="button" class="btn_option" option-call="sort_child2">만 2세</button></span>
						</li>
					</ul>
				</div>
			</div>
			<button type="button" name="button" class="btn_ico type2 add"><span>객실추가</span></button>
			<!-- //2019-12-20 인원선택 부분 수정 -->
		</div>
		<div class="btn_box">
			<button type="submit" name="button" class="btn primary">검색</button>
		</div>
	</div>
	<!-- 팝업 : E -->

	<!-- sort_child1 -->
	<div class="option_select" option-receive="sort_child1">
		<div class="pop_option">
			<ul>
				<li><a href="#" class="on">만 2세</a></li>
				<li><a href="#">만 3세</a></li>
			</ul>
		</div>
	</div>

	<!-- sort_child2 -->
	<div class="option_select" option-receive="sort_child2">
		<div class="pop_option">
			<ul>
				<li><a href="#" class="on">만 2세</a></li>
				<li><a href="#">만 3세</a></li>
			</ul>
		</div>
	</div>
</div>
<script type="text/javascript" src="../../resource/js/jquery-1.11.2.min.js"></script>
<script type="text/javascript" src="../../resource/js/slick.min_v2.js"></script>
<script type="text/javascript" src="../../resource/js/lazyload.js"></script><!-- 2019-11-13 lazyload.js 추가 -->
<script type="text/javascript" src="../../resource/js/intersection-observer.js"></script><!-- 2019-11-13 intersection-observer.js 추가 -->
<script type="text/javascript" src="../../resource/js/bluebird.min.js"></script>
<script type="text/javascript" src="../../resource/js/lalang.js"></script>
</body>
</html>
