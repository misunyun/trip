<!DOCTYPE html>
<html lang="ko">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta http-equiv="Content-Style-Type" content="text/css">
	<meta http-equiv="Content-Script-Type" content="text/javascript">
	<meta name="format-detection" content="telephone=no">
	<title>SHILLATRIP</title>
	<link type="text/css" href="../../resource/css/common.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/help.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/desktop.css" rel="stylesheet" />
</head>

<body>

<div class="wrap">
	<!-- 2019-10-29 전체 로드하는 로딩바 부분 wrap안으로 이동(앱관련수정) -->
	<!-- 로딩바_페이지 전체 로드 -->
	<div class="loader type2">
		<div class="bar"></div>
	</div>
	<!-- //로딩바_페이지 전체 로드 -->

	<!-- 2019-10-29 로딩바_페이지 전체 로드(딤드) -->
	<!-- 2019-11-21 마크업 및 클래스 변경 -->
	<div class="page_loader">
		<div class="loader_area">
			<div class="loader type2">
				<div class="bar"></div>
			</div>
			<!-- 텍스트가 필요한 경우에만 추가해주세요(ex.항공) -->
			<div class="txt_box">
				<!-- <p class="txt">항공권 예약 중 입니다.</p> 항공문구 -->
				<p class="txt">상품을 조회하고 있습니다.</p>
				<p class="sub_txt">잠시만 기다려주세요.</p>
			</div>
			<!-- //텍스트가 필요한 경우에만 추가해주세요(ex.항공) -->
		</div>
	</div>
	<!-- //2019-11-21 마크업 및 클래스 변경 -->
	<!-- //2019-10-29 로딩바_페이지 전체 로드(딤드) -->

	<!-- Header : S -->
	<header class="sticky_step1">
		<h2>
			<a href="#" class="ico btn_back">이전 페이지</a>
			타이틀
		</h2>
	</header>
	<!-- Header : E -->

    <!-- 콘텐츠 : S -->
    <div class="content">

		<!-- 로딩바_리스트 하단에 올경우 -->
		<div class="loader">
			<div class="bar"></div>
		</div>
		<!-- //로딩바_리스트 하단에 올경우 -->

    </div>
	
	<!-- 2020-01-10 fnb 카테고리(ajax) -->
	<div class="ajax_layer category" popup-receive="category">
		<header class="sticky_step1" data-native="status">
			<h2>
				카테고리
				<button type="button" name="button" class="ico btn_close">팝업닫기</button>
			</h2>
		</header>
		<!-- 콘텐츠 : S -->
		<div class="content">
			<!-- 2020-01-08 카테고리 추가 -->
			<div class="category_wrap">
				<ul class="category_list">
					<li>
						<a href="#">
							<span class="tit">항공</span>
							<span class="txt">편도, 왕복, 다구간 항공권 검색</span>
							<span class="cate"><i class="ico_cate flight"></i></span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="tit">숙박</span>
							<span class="txt">실시간 가격비교 숙박 검색</span>
							<span class="cate"><i class="ico_cate hotel"></i></span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="tit">에어텔/패키지</span>
							<span class="txt">추천 특가 에어텔, 패키지 검색</span>
							<span class="cate"><i class="ico_cate package"></i></span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="tit">액티비티</span>
							<span class="txt">쉽고 빠른 전세계 액티비티 검색</span>
							<span class="cate"><i class="ico_cate activity"></i></span>
						</a>
					</li>
				</ul>
			</div>
			<!-- //2020-01-08 카테고리 추가 -->
		</div>
		<!-- 콘텐츠 : E -->
	</div>
	<!--// 2020-01-10 fnb 카테고리(ajax) -->

	<nav class="fnb">
        <a href="#" class="on"><i class="ico home"></i>홈</a><!-- 현재 페이지 'on' 클래스 추가 -->
        <a href="#"><i class="ico cart"></i>장바구니</a>
        <a href="#" class="toggle"><i class="ico review"></i>여행후기</a>
		<a href="#"><i class="ico trip"></i>나의여행</a>
		<a href="#" popup-call="category"><i class="ico cate"></i>카테고리</a><!-- 2020-01-10 수정 -->
    </nav>

    <!-- <div class="option_select " option-receive="fnb">
        <div class="pop_option">
            <ul class="fnb_opt">
                <li><a href="#"><i class="ico flight"></i>항공</a></li>
                <li><a href="#"><i class="ico hotel"></i>숙박</a></li>
                <li><a href="#"><i class="ico pack"></i>패키지</a></li>
                <li><a href="#"><i class="ico acti"></i>액티비티</a></li>
            </ul>
        </div>
    </div> -->
</div>

<script type="text/javascript" src="../../resource/js/jquery-1.11.2.min.js"></script>
<script type="text/javascript" src="../../resource/js/lazyload.js"></script><!-- 2019-11-13 lazyload.js 추가 -->
<script type="text/javascript" src="../../resource/js/intersection-observer.js"></script><!-- 2019-11-13 intersection-observer.js 추가 -->
<script type="text/javascript" src="../../resource/js/bluebird.min.js"></script>
<script type="text/javascript" src="../../resource/js/lalang.js"></script>

</body>
</html>
