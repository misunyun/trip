<!DOCTYPE html>
<html lang="ko">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta http-equiv="Content-Style-Type" content="text/css">
	<meta http-equiv="Content-Script-Type" content="text/javascript">
	<meta name="format-detection" content="telephone=no">
	<title>SHILLATRIP</title>
	<link type="text/css" href="../../resource/css/common.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/mypage.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/desktop.css" rel="stylesheet" />
</head>

<body>
<div class="wrap">


	<!-- 팝업 : S -->
	<div class="popup show">
		<!-- Modal content -->
		<div class="head" data-native="status">
			<h1>무이자할부 안내</h1>
			<button type="button" name="button" class="ico btn_close">팝업닫기</button>
		</div>

		<div class="pop_cont">
			<h2>무이자 할부 (5만원 이상)</h2>
			<table class="tbl_type1">
				<colgroup>
					<col style="width:35%;">
					<col style="width:auto;">
				</colgroup>
				<tbody>
					<tr>
						<th scope="row">삼성카드</th>
						<td>2~5개월</td>
					</tr>
					<tr>
						<th scope="row">신한카드</th>
						<td>2~5개월</td>
					</tr>
					<tr>
						<th scope="row">비씨카드</th>
						<td>2~5개월</td>
					</tr>
					<tr>
						<th scope="row">KB국민카드</th>
						<td>2~5개월</td>
					</tr>
					<tr>
						<th scope="row">현대카드</th>
						<td>2~3개월(7.1~7.31) 2~6개월(8.1~8.31)</td>
					</tr>
					<tr>
						<th scope="row">농협카드</th>
						<td>2~5개월</td>
					</tr>
					<tr>
						<th scope="row">시티카드</th>
						<td>2~5개월</td>
					</tr>
				</tbody>
			</table>

			<h2>부분 무이자 할부 (5만원 이상)</h2>
			<table class="tbl_type1">
				<colgroup>
					<col style="width:35%;">
					<col style="width:auto;">
				</colgroup>
				<tbody>
					<tr>
						<th scope="row">국민카드</th>
						<td> 10개월 (1~2회차 고객부담)</td>
					</tr>
				</tbody>
			</table>

			<div class="note_list">
				<strong>유의사항</strong>
				<ul class="notice_list"><!-- 2019-06-27 내용 변경 -->
					<li>법인, 체크, 선불, 올앳, 기프트, 하이브리드카드 제외</li>
					<li>씨티카드 결제 시 씨티BC, 기업 제외</li>
					<li>BC카드 결제 시 NON-BC 제외</li>
					<li>신한BC, 씨티BC는 BC카드 할부 행사 적용</li>
				</ul>
			</div>
		</div>
		<div class="btn_box">
			<button type="submit" name="button" class="btn primary">확인</button>
		</div>

	</div>
	<!-- 팝업 : E -->
</div>
<script type="text/javascript" src="../../resource/js/jquery-1.11.2.min.js"></script>
<script type="text/javascript" src="../../resource/js/slick.min_v2.js"></script>
<script type="text/javascript" src="../../resource/js/lazyload.js"></script><!-- 2019-11-13 lazyload.js 추가 -->
<script type="text/javascript" src="../../resource/js/intersection-observer.js"></script><!-- 2019-11-13 intersection-observer.js 추가 -->
<script type="text/javascript" src="../../resource/js/bluebird.min.js"></script>
<script type="text/javascript" src="../../resource/js/lalang.js"></script>
</body>
</html>
