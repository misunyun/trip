<!DOCTYPE html>
<html lang="ko">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta http-equiv="Content-Style-Type" content="text/css">
	<meta http-equiv="Content-Script-Type" content="text/javascript">
	<meta name="format-detection" content="telephone=no">
	<title>SHILLATRIP</title>
	<link type="text/css" href="../../resource/css/common.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/mypage.css" rel="stylesheet" />
	<link type="text/css" href="../../resource/css/desktop.css" rel="stylesheet" />
</head>

<body>
<div class="wrap">


	<!-- 팝업 : S -->
	<div class="popup show">
		<!-- Modal content -->
		<div class="head" data-native="status">	<!-- data-native 추가  2019-11-07 -->
			<button type="button" name="button" class="ico btn_close">팝업닫기</button>
		</div>
		<div class="pop_cont">
			<div class="s_rewards">
                <p class="tit"><em>캐시백? NO! 선 적립? YES!</em>해외 호텔 적립도 미리 받으세요!</p>
                <div class="inner_bx">
                    <p class="txt">신라트립에서 결제가 이루어지지 않는 숙박 제휴사의 경우, 적립 예정 S.Rewards 만큼 미리 결제하고 출발 전 적립을 받을 수 있습니다. 결제하신 금액은 숙박 체크아웃 후 자동으로 취소 처리 됩니다.</p>
                    <div class="process">
                        <ol class="step_5"> <!-- 2019-10-29 수정 -->
                            <li>
                                <span class="circle">S.Rewards<br />금액 확인</span>
                                <span class="arrow right"></span>
                            </li>
                            <li>
                                <span class="circle">S.Rewards<br />결제</span>
                                <span class="arrow right"></span>
                            </li>
                            <li> <!-- 2019-10-29 수정 -->
                                <span class="circle">S.Rewards<br />적립</span>
                                <span class="arrow down"></span>
                            </li>
                            <li>
                                <span class="circle">숙박<br />체크아웃</span>
                                <span class="arrow left"></span>
                            </li>
                            <li>
                                <span class="circle last">S.Rewards<br />결제취소</span>
                            </li>
                        </ol>
                    </div>
                </div>
                <div class="saving_rewards">
                    <span class="txt b">적립 예정 S.Rewards </span>
                    <span class="point em"><em>10,000</em>P(10,000원)</span><!-- 2019-12-06 S.Rewards 표기 법 수정 -->
                </div>
			</div>
		</div>
		<div class="btn_box">
			<button type="submit" name="button" class="btn primary">S.Rewards 받기</button>
		</div>
	</div>
	<!-- 팝업 : E -->
</div>
<script type="text/javascript" src="../../resource/js/jquery-1.11.2.min.js"></script>
<script type="text/javascript" src="../../resource/js/slick.min_v2.js"></script>
<script type="text/javascript" src="../../resource/js/lazyload.js"></script><!-- 2019-11-13 lazyload.js 추가 -->
<script type="text/javascript" src="../../resource/js/intersection-observer.js"></script><!-- 2019-11-13 intersection-observer.js 추가 -->
<script type="text/javascript" src="../../resource/js/bluebird.min.js"></script>
<script type="text/javascript" src="../../resource/js/lalang.js"></script>
</body>
</html>
