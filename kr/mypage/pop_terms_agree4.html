<div class="wrap">

	<!-- 팝업 : S -->

				<p class="txt">고객님께서는 아래 내용에 대하여 동의를 거부하실 수 있으며, 거부 시 예약 및 결제, 일부 포인트 적립이 제한됩니다.</p>
				<table class="tbl_type1">

						<col style="width:35%;">

					</colgroup>
					<tbody>
						<tr>

						</tr>
					</tbody>
				</table>
			</div>
		</div>
		<div class="btn_box">
			<button type="submit" name="button" class="btn primary">확인</button>
		</div>
